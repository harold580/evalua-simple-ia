          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://integrate.api.nvidia.com; base-uri 'self'; form-action 'self';" />
    <!-- Política de referrer: no enviar referrer a otros dominios -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
  </head>
